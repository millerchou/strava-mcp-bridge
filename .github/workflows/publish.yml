name: Publish npm Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify npm supports OIDC trusted publishing
        run: |
          node -e 'const v=require("child_process").execFileSync("npm", ["--version"], {encoding:"utf8"}).trim().split(".").map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) throw new Error(`npm ${v.join(".")} does not support trusted publishing; need >=11.5.1`)'
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e 'const version=require("./package.json").version; if (process.env.RELEASE_TAG !== `v${version}`) throw new Error(`release tag ${process.env.RELEASE_TAG} does not match v${version}`)'
      - run: npm test
      - run: npm run build:keychain-helper
      - run: npm pack --dry-run
      - name: Check whether this version already exists
        id: registry
        run: |
          PACKAGE_NAME=$(node -p 'require("./package.json").name')
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          STATUS=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "https://registry.npmjs.org/${PACKAGE_NAME}/${PACKAGE_VERSION}")
          case "$STATUS" in
            200) echo "exists=true" >> "$GITHUB_OUTPUT" ;;
            404) echo "exists=false" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected npm registry status: $STATUS" >&2; exit 1 ;;
          esac
      - name: Publish package through npm OIDC
        if: steps.registry.outputs.exists != 'true'
        run: npm publish --access public
      - name: Skip existing package version
        if: steps.registry.outputs.exists == 'true'
        run: echo "Package version already exists; skipping duplicate npm publish."
