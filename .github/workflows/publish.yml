name: Publish npm Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e 'const version=require("./package.json").version; if (process.env.RELEASE_TAG !== `v${version}`) throw new Error(`release tag ${process.env.RELEASE_TAG} does not match v${version}`)'
      - run: npm test
      - run: npm run build:keychain-helper
      - run: npm pack --dry-run
      - run: npm publish --access public
